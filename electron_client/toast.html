<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.R.C TRANSLATOR</title>
    <link rel="icon" href="assets/spider-intro.png" type="image/png">
    <style>
        :root {
            color-scheme: dark;
            --accent: #b49aff;
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
        }

        body {
            display: grid;
            place-items: center;
            padding: 0;
        }

        .toast-shell {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            padding: clamp(6px, 8vh, 18px) clamp(32px, 7vw, 46px) clamp(6px, 9vh, 20px) clamp(8px, 4vw, 24px);
            border: 0;
            border-radius: 0;
            color: var(--text);
            background: rgba(22, 13, 38, 0.94);
            cursor: grab;
            -webkit-app-region: drag;
        }

        .toast-shell:active {
            cursor: grabbing;
        }

        .toast-shell.configured-overlay {
            padding: clamp(6px, 3vmin, 16px);
            cursor: default;
            -webkit-app-region: no-drag;
        }

        .toast-shell.configured-overlay .close-button,
        .toast-shell.configured-overlay .toast-header {
            display: none;
        }

        .toast-header {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 11px;
            color: var(--accent);
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .brand-mark {
            width: 25px;
            height: 25px;
            display: grid;
            place-items: center;
            width: 19px;
            height: 22px;
            background: color-mix(in srgb, var(--panel-color, #160d26) 35%, white);
            -webkit-mask: url("assets/spider-intro.png") center / contain no-repeat;
            mask: url("assets/spider-intro.png") center / contain no-repeat;
            opacity: 0.9;
        }

        .content-row {
            position: relative;
            z-index: 1;
            width: 100%;
            min-width: 0;
            min-height: 0;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .spinner {
            display: none;
            width: 19px;
            height: 19px;
            flex: 0 0 auto;
            border: 2px solid rgba(180, 154, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 650ms linear infinite;
        }

        .toast-shell.loading .spinner {
            display: block;
        }

        #content {
            flex: 1;
            width: 100%;
            min-width: 0;
            max-width: 100%;
            max-height: 100%;
            color: inherit;
            font-size: 18px;
            font-weight: 560;
            line-height: 1.45;
            letter-spacing: -0.012em;
            overflow: hidden;
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .toast-shell.loading #content {
            color: rgba(255, 255, 255, 0.78);
            font-size: 15px;
            letter-spacing: 0.01em;
        }

        .close-button {
            position: absolute;
            z-index: 3;
            top: 14px;
            right: 14px;
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            border: 1px solid transparent;
            border-radius: 0;
            color: rgba(255, 255, 255, 0.46);
            background: transparent;
            cursor: pointer;
            -webkit-app-region: no-drag;
            transition: 140ms ease;
        }

        .close-button:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.11);
            background: rgba(255, 255, 255, 0.08);
        }

        .close-button svg {
            width: 13px;
            height: 13px;
        }

        @media (max-height: 118px) {
            .toast-shell {
                padding-top: 7px;
                padding-bottom: 7px;
            }

            .toast-header {
                display: none;
            }
        }

        @media (max-width: 260px) {
            .toast-shell {
                padding-left: 8px;
                padding-right: 32px;
            }

            .toast-shell.configured-overlay {
                padding-right: 8px;
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="toast-shell" id="toastBox">
        <button class="close-button" id="closeButton" type="button" aria-label="Fechar tradução">
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="m4 4 8 8m0-8-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
        <div class="toast-header">
            <span class="brand-mark" aria-hidden="true"></span>
        </div>
        <div class="content-row">
            <span class="spinner" aria-hidden="true"></span>
            <div id="content" role="status" aria-live="polite" aria-atomic="true">Carregando...</div>
        </div>
    </div>

    <script src="text_fit.js"></script>
    <script>
        const desktopApi = window.ocrDesktop;
        const toastBox = document.getElementById('toastBox');
        const content = document.getElementById('content');
        const contentRow = document.querySelector('.content-row');
        let preferredFontSize = 18;
        let loadingState = false;

        function fitTextToOverlay() {
            const maximum = loadingState ? Math.min(15, preferredFontSize) : preferredFontSize;
            const minimum = Math.min(maximum, 6);
            const fittingSize = window.ocrTextFit.largestFittingFontSize(
                maximum,
                minimum,
                candidate => {
                    content.style.fontSize = `${candidate}px`;
                    return content.scrollHeight <= content.clientHeight + 1
                        && content.scrollWidth <= content.clientWidth + 1;
                }
            );
            content.style.fontSize = `${fittingSize}px`;
        }

        const textFitScheduler = window.ocrTextFit.createLatestFrameScheduler(
            requestAnimationFrame,
            cancelAnimationFrame,
            fitTextToOverlay
        );

        function scheduleTextFit() {
            textFitScheduler.schedule();
        }

        function hexToRgba(hex, alpha) {
            if (typeof hex !== 'string' || !/^#[0-9a-f]{6}$/i.test(hex)) {
                return `rgba(22, 13, 38, ${alpha})`;
            }
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        const unsubscribeText = desktopApi.toast.onSetText(data => {
            const text = typeof data?.text === 'string' ? data.text : '';
            const style = data?.style || {};
            const loading = text.trim().toLowerCase().startsWith('traduzindo');

            content.textContent = text;
            preferredFontSize = Math.min(36, Math.max(12, Number(style.fontSize) || 18));
            loadingState = loading;
            const fontFamily = typeof style.fontFamily === 'string' && style.fontFamily
                ? style.fontFamily.replace(/[;{}"\\]/g, '')
                : 'Segoe UI';
            const textAlign = ['left', 'center', 'right'].includes(style.textAlign)
                ? style.textAlign
                : 'left';
            toastBox.classList.toggle('loading', loading);
            toastBox.classList.toggle('configured-overlay', Boolean(style.overlayAreaConfigured));
            toastBox.style.color = style.textColor || '#ffffff';
            content.style.fontFamily = `"${fontFamily}", "Segoe UI", sans-serif`;
            content.style.textAlign = textAlign;
            toastBox.style.setProperty('--panel-color', style.bgColor || '#160d26');
            toastBox.style.background = hexToRgba(
                style.bgColor || '#160d26',
                style.opacity !== undefined ? style.opacity : 0.94
            );
            scheduleTextFit();
        });

        document.fonts?.ready.then(scheduleTextFit).catch(() => {});

        const resizeObserver = typeof ResizeObserver === 'function'
            ? new ResizeObserver(scheduleTextFit)
            : null;
        if (resizeObserver) {
            resizeObserver.observe(toastBox);
            resizeObserver.observe(contentRow);
        } else {
            window.addEventListener('resize', scheduleTextFit);
        }

        document.getElementById('closeButton').addEventListener('click', event => {
            event.stopPropagation();
            desktopApi.toast.close();
        });

        window.addEventListener('beforeunload', () => {
            unsubscribeText();
            resizeObserver?.disconnect();
            textFitScheduler.cancel();
        });
    </script>
</body>
</html>
